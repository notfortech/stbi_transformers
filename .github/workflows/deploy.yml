name: Build and deploy DashboardAgents API to Azure Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore DashboardAgents/src/DashboardAgents.Api/DashboardAgents.Api.csproj

      - name: Build (Release)
        run: dotnet build DashboardAgents/src/DashboardAgents.Api/DashboardAgents.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish DashboardAgents/src/DashboardAgents.Api/DashboardAgents.Api.csproj --configuration Release --no-build --output publish

      - name: Upload artifact for deploy job
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          # ⚠️  Update this to your actual Azure Web App name
          app-name: 'dashboard-agents-api'
          slot-name: 'Production'
          package: .
