name: Build and deploy DashboardAgents API to Azure Web App - stbitransformers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore DashboardAgents/src/DashboardAgents.Api/DashboardAgents.Api.csproj

      - name: Build (Release)
        run: dotnet build DashboardAgents/src/DashboardAgents.Api/DashboardAgents.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish DashboardAgents/src/DashboardAgents.Api/DashboardAgents.Api.csproj --configuration Release --no-build --output "${{ env.DOTNET_ROOT }}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'stbitransformers'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_F330569C284B4783B7493643CF5AF111 }}
