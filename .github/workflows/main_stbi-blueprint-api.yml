# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
#
# NOTE: Azure Deployment Center's auto-generated build steps (`dotnet build`/`dotnet publish`
# with no project argument, run from repo root) don't work here — this repo has no root-level
# .sln/.csproj (the solution lives at DashboardAgents/DashboardAgents.sln, alongside 5+ project
# .csproj files). Kept the Deployment Center's publish-profile secret (that part wired up fine),
# replaced only the build/publish steps with the project-targeted ones already proven correct in
# main_stbitransformers.yml.

name: Build and deploy DashboardAgents API to Azure Web App - stbi-blueprint-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore DashboardAgents/src/DashboardAgents.Api/DashboardAgents.Api.csproj

      - name: Build (Release)
        run: dotnet build DashboardAgents/src/DashboardAgents.Api/DashboardAgents.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish DashboardAgents/src/DashboardAgents.Api/DashboardAgents.Api.csproj --configuration Release --no-build --output "${{ env.DOTNET_ROOT }}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app-blueprint-api
          path: ${{ env.DOTNET_ROOT }}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app-blueprint-api

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'stbi-blueprint-api'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_33C3A8A6905945A494F95807FFBB0814 }}